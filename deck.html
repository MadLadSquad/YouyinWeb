<!DOCTYPE html>
<html lang="en">
    <head>
        {{ include Components/head.tmpl.html }}
        <link rel="stylesheet" href="./styles/components/card.css" type="text/css">
        <link rel="stylesheet" href="./styles/components/writer.css" type="text/css">
        <link rel="stylesheet" href="./styles/components/button.css" type="text/css">
        <link rel="stylesheet" href="./styles/components/page-search.css" type="text/css">
        <link rel="stylesheet" href="./styles/pages/deck.css" type="text/css">

        <title class="site-title">{{ _ no_cards_link_deck }} | {{ trademark }} </title>
    </head>
    <body>
        {{ include Components/header.tmpl.html }}
        <h1 class="centered">{{ _ no_cards_link_deck }}</h1>
        <main id="main-content">
            <!-- Deferred: nothing needs HanziWriter until the first card hover (resting cards are
                 hand-built SVG), so it must not block initial parse/render of the deck -->
            <script defer src="https://cdn.jsdelivr.net/npm/hanzi-writer/dist/hanzi-writer.min.js"></script>
            <section class="deck">
                <div id="new-card" class="card centered">
                    <h1 id="new-card-header">+</h1>
                    <p>{{ _ new-card-header }}</p>
                    <button id="new-card-button" class="card-button-edit">{{ _ new-card-button }}</button>
                    <button id="new-phrase-button" class="card-button-edit">{{ _ new-phrase-button }}</button>
                    <br>
                    <input type="file" id="fileupload" accept="application/json"/><button id="import-deck-button" class="card-button-edit">{{ _ import-deck-button }}</button>
                    <button id="export-deck-button" class="card-button-edit">{{ _ export-deck-button }}</button>

                    <button id="clear-deck-button" class="card-button-edit">{{ _ clear-deck-button }}</button>
                    <button id="marketplace-deck-button" class="card-button-edit">{{ _ marketplace-deck-button }}</button>

                </div>
            </section>
            <div class="page-search-wrapper">
                <input type="search" id="deck-search" class="page-search" placeholder="{{ _ deck_search_placeholder }}" aria-label="{{ _ deck_search_placeholder }}" autocomplete="off">
            </div>
            <h1 id="deck-phrases-header" class="centered">{{ _ deck-phrases-header }}</h1>
            <section class="deck" id="deck-phrases-section">
                <!-- Data will be inserted dynamically by the Javascript here from the deck.js file -->
            </section>
            <h1 id="deck-characters-header" class="centered">{{ _ deck-characters-header }}</h1>
            <section class="deck" id="deck-characters-section">
                <!-- Data will be inserted dynamically by the Javascript here from the deck.js file -->
            </section>
        </main>
        {{ include Components/footer.tmpl.html }}
    </body>
    <script src="./scripts/data/character-database.js"></script>
    <script src="./scripts/components/writer.js"></script>
    <script src="./scripts/utils/format.js"></script>
    <script src="./scripts/utils/fuzzy-match.js"></script>
    <script src="./scripts/components/card-search.js"></script>
    <script src="./scripts/pages/deck.js"></script>
</html>
