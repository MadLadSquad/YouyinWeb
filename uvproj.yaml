localhost-commands:
  - 'SED=$(command -v gsed || command -v sed); FIND=$(command -v gfind || command -v find); "$FIND" ./ -type f \( -iname "*.html" -o -iname "*.js" \) -exec "$SED" -i "s|\./|http://127.0.0.1:8080/|g" {} +'
  - "python3 -m http.server 8080"
allowed-extensions:
  - html
  - js
  - yaml
  - yml
filename-blacklist:
  - .git
  - UBTCustomFunctions
  - UVKBuildTool
  - .github
  - .idea
  - .vs
  - Translations
intermediate-extensions:
  - .tmpl.html
variables:
  - var: trademark
    val: Youyin
