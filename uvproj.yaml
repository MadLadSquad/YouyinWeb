localhost-commands:
  - 'SED=$(command -v gsed || command -v sed); FIND=$(command -v gfind || command -v find); "$FIND" ./ -type f \( -iname "*.html" -o -iname "*.js" \) -exec "$SED" -i "s|\./|http://127.0.0.1:8080/|g" {} +'
  - "python3 -m http.server 8080"
allowed-extensions:
  - html
  - js
  - yaml
  - yml
  - json
  - txt
  - xml
filename-blacklist:
  - .git
  - UBTCustomFunctions
  - UVKBuildTool
  - .github
  - .idea
  - .vs
  - Translations
  - graphify-out
  - .claude
  - .agents
intermediate-extensions:
  - .tmpl.html
variables:
  - var: trademark
    val: Youyin
  - var: cannonical_url
    val: https://youyin.madladsquad.com
  - var: marketplace_url
    val: https://github.com/MadLadSquad/YouyinPublicDeckRepository
  - var: marketplace_cdn_url
    val: https://cdn.jsdelivr.net/gh/MadLadSquad/YouyinPublicDeckRepository@latest
  - var: char_data_url
    val: https://cdn.jsdelivr.net/gh/MadLadSquad/hanzi-writer-data-youyin@latest
  - var: additional_cdn_hosts
    val: "none"
