<!DOCTYPE html>
<html lang="en">
    <head>
        {{ include Components/head.tmpl.html }}
        <link rel="stylesheet" href="./styles/components/card.css" type="text/css">
        <link rel="stylesheet" href="./styles/components/writer.css" type="text/css">
        <link rel="stylesheet" href="./styles/components/button.css" type="text/css">
        <link rel="stylesheet" href="./styles/components/page-search.css" type="text/css">
        <link rel="stylesheet" href="./styles/pages/marketplace.css" type="text/css">

        <title class="site-title">{{ _ marketplace-deck-button }} | {{ trademark }} </title>
    </head>
    <body>
        {{ include Components/header.tmpl.html }}
        <main id="main-content">
            <section class="deck">
                <div id="new-deck-upload-card" class="card centered">
                    <h3 id="new-card-header-smaller">+</h3>
                    <p>{{ _ new_deck_upload_info }}</p>
                    <button id="upload-deck-public" class="card-button-edit">{{ _ upload-deck-public }}</button>
                </div>
            </section>
            <div class="page-search-wrapper">
                <input type="search" id="marketplace-search" class="page-search" placeholder="{{ _ marketplace_search_placeholder }}" aria-label="{{ _ marketplace_search_placeholder }}" autocomplete="off">
            </div>
            <h1 class="centered">{{ _ official_decks_header }}</h1>
            <section id="marketplace-deck-container">
            </section>
            <section id="deck-community-master">
            </section>
        </main>
        <!-- Loaded BEFORE the footer (which runs index.js then tutorial.js): tutorial.js's dispatch calls
             this file's stage functions from a youyinProfileReady microtask that drains before any script
             placed after the footer would run, so the definitions must exist beforehand -->
        <script src="./scripts/components/tutorial/marketplace.js"></script>
        {{ include Components/footer.tmpl.html }}
        <!-- Loaded AFTER the footer: marketplace.js consumes the readiness promises (youyinStorageReady, …)
             that index.js creates, so index.js must run first -->
        <script src="./scripts/utils/fuzzy-match.js"></script>
        <script src="./scripts/components/card-search.js"></script>
        <script src="./scripts/pages/marketplace.js"></script>
    </body>
</html>
