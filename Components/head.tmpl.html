<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ _ site-description }}">
<meta name="keywords" content="{{ trademark }}, learn to write Chinese characters, Hanzi stroke order, Japanese Kana, Hiragana, Katakana, Kanji, Korean Hangul, Hanja, Greek alphabet, Cyrillic, handwriting practice, stroke order practice, language learning app, writing systems, flashcards, spaced repetition, 卣囙, Yǒuyīn">
<meta name="author" content="MadLadSquad">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

<!-- Open Graph / social + LLM rich-link metadata -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ trademark }}">
<meta property="og:title" content="{{ trademark }} — learn to handwrite Chinese, Japanese, Korean, Greek & more">
<meta property="og:description" content="{{ _ site-description }}">
<meta property="og:image" content="./icon-512.png">
<meta property="og:locale" content="{{ _ og_locale }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ trademark }} — learn to handwrite Chinese, Japanese, Korean, Greek & more">
<meta name="twitter:description" content="{{ _ site-description }}">
<meta name="twitter:image" content="./icon-512.png">

<!-- Structured data: helps search engines and LLMs understand the site -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@graph": [
        {
            "@type": "WebApplication",
            "name": "{{ trademark }}",
            "url": "{{ cannonical_url }}",
            "applicationCategory": "EducationalApplication",
            "operatingSystem": "Any (web browser)",
            "browserRequirements": "Requires JavaScript and a modern browser.",
            "description": "{{ _ site-description }}",
            "inLanguage": ["en", "bg"],
            "isAccessibleForFree": true,
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "featureList": [
                "Stroke-order handwriting practice graded in real time",
                "Chinese Hanzi, Japanese Kana and Kanji, Korean Hangul and Hanja, Greek and Cyrillic",
                "Spaced revision of cards and phrases",
                "Importable public deck marketplace",
                "Offline-capable installable PWA, data stored locally"
            ],
            "author": { "@type": "Organization", "name": "Heapforge", "url": "https://heapforge.com" }
        },
        {
            "@type": "WebSite",
            "name": "{{ trademark }}",
            "url": "{{ cannonical_url }}",
            "inLanguage": ["en", "bg"],
            "publisher": { "@type": "Organization", "name": "MadLadSquad", "url": "https://heapforge.com" }
        }
    ]
}
</script>

<link rel="icon" type="image/png" href="./favicon-new.png">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#c87e74">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="{{ trademark }}">
<link rel="apple-touch-icon" href="./icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet" type="text/css">
<!-- Browser-support gate: runs first, before any storage access, request or app code, so it can
     freeze the app and show a blocking message when a privacy/lockdown profile blocks the storage
     the site needs (the JS-disabled case is handled by the <noscript> in header.tmpl.html) -->
<script src="./scripts/data/browser-support.js"></script>
<!-- Loaded before the stylesheets so the saved theme's colours are injected before first paint -->
<script src="./scripts/data/theme.js"></script>
<!-- Deferred so it doesn't block HTML parsing/first paint; nothing needs it before initEmojiReplacement,
     which waits for it (see emoji.js) in case this hasn't executed yet by the time index.js runs -->
<script defer src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
<!-- Global stylesheets used on every page. Page-specific and multi-page component stylesheets are
     linked per-page (see each *.html). -->
<link rel="stylesheet" href="./styles/components/base.css" type="text/css">
<link rel="stylesheet" href="./styles/components/header.css" type="text/css">
<link rel="stylesheet" href="./styles/components/select-box.css" type="text/css">
<link rel="stylesheet" href="./styles/components/char-loading.css" type="text/css">
<!-- Driver.js (product-tour library) + our onboarding tutorial styles. driver.css must precede
     tutorial.css so the theme-aware .tutorial-popover overrides win the cascade -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css" type="text/css">
<link rel="stylesheet" href="./styles/components/tutorial.css" type="text/css">
